<!DOCTYPE html>
<html>
<head>
    <title>Award Voting 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
            text-align: center;
        }

        header {
            background: black;
            color: white;
            padding: 20px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            margin: 10px auto;
            padding: 15px;
            width: 90%;
            max-width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            background: green;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 5px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<header>
    <h1>Award Voting 2026</h1>
    <p>Vote for your favorite nominee</p>
</header>

<div class="container">

    <div class="card">
        <h3>Best Student Leader</h3>
        <p>Nominee: John Doe</p>
        <button onclick="alert('Voting system coming soon')">Vote</button>
    </div>

    <div class="card">
        <h3>Best Entrepreneur</h3>
        <p>Nominee: Jane Smith</p>
        <button onclick="alert('Voting system coming soon')">Vote</button>
    </div>

</div>

</body>
</html>
