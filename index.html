<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUG — The Polytechnic Ibadan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Archivo+Expanded:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F3ED;
    --ink:#142620;
    --primary:#1B4D3E;
    --primary-light:#2F7A5E;
    --gold:#E2A63B;
    --red:#B5402F;
    --card:#FFFFFF;
    --line:rgba(20,38,32,0.12);
    --max:1180px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  img,svg{display:block;max-width:100%;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 24px;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:0.75rem;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--primary-light);
    font-weight:500;
  }
  h1,h2,h3,h4{font-family:'Archivo',sans-serif;font-weight:900;letter-spacing:-0.01em;color:var(--ink);}
  .subhead{font-family:'Archivo Expanded',sans-serif;font-weight:700;}

  /* ===== NAV ===== */
  header{
    position:sticky;top:0;z-index:100;
    background:rgba(245,243,237,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .nav{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 24px;max-width:var(--max);margin:0 auto;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-text{display:flex;flex-direction:column;line-height:1.15;}
  .brand-text .top{font-family:'Archivo',sans-serif;font-weight:900;font-size:1rem;letter-spacing:0.02em;}
  .brand-text .bottom{font-size:0.7rem;color:var(--primary-light);font-family:'JetBrains Mono',monospace;letter-spacing:0.12em;text-transform:uppercase;}
  nav.links{display:flex;gap:28px;font-weight:600;font-size:0.92rem;}
  nav.links a{position:relative;padding:4px 0;transition:color 0.2s;}
  nav.links a:hover{color:var(--primary-light);}
  nav.links a.active{color:var(--primary);}
  nav.links a.active::after{
    content:"";position:absolute;left:0;bottom:-2px;width:100%;height:2px;background:var(--gold);
  }
  .menu-toggle{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:5px;padding:6px;}
  .menu-toggle span{width:24px;height:2px;background:var(--ink);display:block;}

  @media(max-width:860px){
    nav.links{
      position:absolute;top:100%;left:0;right:0;
      background:var(--bg);
      flex-direction:column;gap:0;
      border-bottom:1px solid var(--line);
      max-height:0;overflow:hidden;transition:max-height 0.3s ease;
    }
    nav.links.open{max-height:380px;}
    nav.links a{padding:14px 24px;border-top:1px solid var(--line);}
    .menu-toggle{display:flex;}
  }

  /* ===== SEAL ===== */
  .seal{width:46px;height:46px;flex-shrink:0;object-fit:contain;}
  .seal-large{width:118px;height:118px;}

  /* ===== HERO ===== */
  .hero{
    padding:90px 0 70px;
    border-bottom:1px solid var(--line);
    position:relative;
    overflow:hidden;
  }
  .hero .wrap{display:grid;grid-template-columns:1.4fr 1fr;gap:48px;align-items:center;}
  .hero h1{
    font-size:clamp(2.6rem,6vw,4.6rem);
    line-height:1.02;
    margin:18px 0 22px;
  }
  .hero h1 .accent{color:var(--primary);}
  .hero p.lead{font-size:1.08rem;max-width:520px;color:#3c4d46;margin-bottom:32px;}
  .cta-row{display:flex;gap:14px;flex-wrap:wrap;}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:14px 26px;border-radius:2px;
    font-weight:600;font-size:0.95rem;
    border:1px solid var(--ink);
    transition:all 0.2s;
  }
  .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
  .btn-primary:hover{background:var(--primary-light);border-color:var(--primary-light);}
  .btn-ghost{background:transparent;color:var(--ink);}
  .btn-ghost:hover{background:var(--ink);color:var(--bg);}

  .session-card{
    background:var(--primary);color:#fff;
    border-radius:4px;padding:34px;
    position:relative;overflow:hidden;
  }
  .session-card::before{
    content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(135deg,rgba(255,255,255,0.03) 0 18px,transparent 18px 36px);
  }
  .session-card .label{font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);position:relative;}
  .sug-mark{
    width:84px;height:auto;position:absolute;top:24px;right:24px;
    opacity:0.92;filter:drop-shadow(0 4px 10px rgba(0,0,0,0.25));
  }
  .session-card{position:relative;}
  .session-card .num{font-family:'Archivo',sans-serif;font-weight:900;font-size:3.6rem;line-height:1;margin:10px 0;position:relative;}
  .session-card .sess{font-family:'JetBrains Mono',monospace;font-size:1rem;position:relative;}
  .session-card .motto{margin-top:18px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.18);font-size:0.92rem;color:rgba(255,255,255,0.85);position:relative;font-style:italic;}

  @media(max-width:860px){
    .hero .wrap{grid-template-columns:1fr;}
  }

  /* ===== SECTION GENERIC ===== */
  section{padding:80px 0;border-bottom:1px solid var(--line);}
  .section-head{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;margin-bottom:46px;flex-wrap:wrap;}
  .section-head h2{font-size:clamp(1.9rem,4vw,2.7rem);}
  .section-head .num-tag{font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--primary-light);}

  /* ===== ABOUT ===== */
  .about-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:54px;}
  .about-grid p{color:#3c4d46;margin-bottom:16px;max-width:560px;}
  .stat-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:24px;}
  .stat{
    border:1px solid var(--line);padding:20px;border-radius:4px;background:var(--card);
  }
  .stat .n{font-family:'JetBrains Mono',monospace;font-size:1.9rem;color:var(--primary);font-weight:500;}
  .stat .l{font-size:0.85rem;color:#5b6b65;margin-top:4px;}

  /* ===== PILLARS ===== */
  .pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
  .pillar{
    background:var(--card);border:1px solid var(--line);border-radius:4px;
    padding:28px;transition:transform 0.2s, box-shadow 0.2s;
  }
  .pillar:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(20,38,32,0.08);}
  .pillar .icon{width:38px;height:38px;margin-bottom:18px;color:var(--primary);}
  .pillar h3{font-size:1.15rem;margin-bottom:8px;}
  .pillar p{font-size:0.93rem;color:#5b6b65;}

  @media(max-width:900px){
    .about-grid{grid-template-columns:1fr;}
    .pillars{grid-template-columns:1fr 1fr;}
  }
  @media(max-width:600px){.pillars{grid-template-columns:1fr;}}

  /* ===== EXEC GRID ===== */
  .exec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:26px;}
  .exec-card{text-align:left;}
  .avatar{
    width:100%;aspect-ratio:1/1;border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Archivo',sans-serif;font-weight:900;font-size:2.6rem;color:#fff;
    margin-bottom:14px;position:relative;overflow:hidden;
  }
  .avatar::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,0.18),transparent 60%);
  }
  .exec-card h3{font-size:1.05rem;margin-bottom:2px;}
  .exec-card .role{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--primary-light);text-transform:uppercase;letter-spacing:0.08em;}
  .exec-card .faculty{font-size:0.85rem;color:#5b6b65;margin-top:6px;}

  @media(max-width:900px){.exec-grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:520px){.exec-grid{grid-template-columns:1fr 1fr;gap:16px;} .avatar{font-size:1.8rem;}}

  /* ===== LEDGER (past administrations) ===== */
  .ledger{border:1px solid var(--line);border-radius:4px;overflow:hidden;background:var(--card);}
  .ledger-row{
    display:grid;grid-template-columns:90px 70px 1fr 1fr 140px;gap:18px;
    align-items:center;padding:18px 24px;border-bottom:1px solid var(--line);
  }
  .ledger-row:last-child{border-bottom:none;}
  .ledger-row.head{
    font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:0.15em;
    text-transform:uppercase;color:#5b6b65;background:rgba(27,77,62,0.04);
  }
  .ledger-row .ord{font-family:'Archivo',sans-serif;font-weight:900;color:var(--primary);font-size:1.1rem;}
  .ledger-row .photo{
    width:42px;height:42px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Archivo',sans-serif;font-weight:700;color:#fff;font-size:0.85rem;
  }
  .ledger-row .pres-name{font-weight:600;}
  .ledger-row .vp-name{color:#5b6b65;font-size:0.92rem;}
  .ledger-row .yr{font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:#5b6b65;}

  @media(max-width:760px){
    .ledger-row{grid-template-columns:50px 36px 1fr;grid-template-areas:"ord photo pres" "ord photo vp" "ord photo yr";row-gap:2px;padding:14px 16px;}
    .ledger-row.head{display:none;}
    .ledger-row .ord{grid-area:ord;}
    .ledger-row .photo{grid-area:photo;}
    .ledger-row .pres-name{grid-area:pres;}
    .ledger-row .vp-name{grid-area:vp;}
    .ledger-row .yr{grid-area:yr;}
  }

  /* ===== NOTICES ===== */
  .notices{display:flex;flex-direction:column;gap:0;border:1px solid var(--line);border-radius:4px;overflow:hidden;background:var(--card);}
  .notice{
    display:grid;grid-template-columns:120px 1fr;gap:24px;padding:24px;border-bottom:1px solid var(--line);
  }
  .notice:last-child{border-bottom:none;}
  .notice .date{font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--primary-light);}
  .notice h4{font-size:1.05rem;margin-bottom:6px;}
  .notice p{font-size:0.92rem;color:#5b6b65;}
  .tag{
    display:inline-block;font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;
    text-transform:uppercase;padding:3px 8px;border-radius:2px;margin-bottom:8px;
  }
  .tag.welfare{background:rgba(27,77,62,0.1);color:var(--primary);}
  .tag.event{background:rgba(226,166,59,0.18);color:#9c6c11;}
  .tag.alert{background:rgba(181,64,47,0.1);color:var(--red);}

  @media(max-width:600px){.notice{grid-template-columns:1fr;gap:6px;}}

  /* ===== CONTACT ===== */
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:54px;}
  .contact-info h3{font-size:1.4rem;margin-bottom:18px;}
  .contact-info .item{margin-bottom:18px;}
  .contact-info .item .l{font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--primary-light);margin-bottom:4px;}
  .contact-info .item .v{font-size:1rem;}
  .social-row{display:flex;gap:12px;margin-top:24px;}
  .social-row a{
    width:42px;height:42px;border:1px solid var(--line);border-radius:50%;
    display:flex;align-items:center;justify-content:center;transition:all 0.2s;
  }
  .social-row a:hover{background:var(--primary);color:#fff;border-color:var(--primary);}

  .form{display:flex;flex-direction:column;gap:16px;}
  .form label{font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#5b6b65;}
  .form input,.form textarea{
    width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:3px;
    background:var(--card);font-family:'Inter',sans-serif;font-size:0.95rem;color:var(--ink);
    margin-top:6px;
  }
  .form input:focus,.form textarea:focus{outline:2px solid var(--primary-light);outline-offset:1px;}
  .form button{align-self:flex-start;margin-top:6px;cursor:pointer;}

  @media(max-width:860px){.contact-grid{grid-template-columns:1fr;}}

  /* ===== FOOTER ===== */
  footer{padding:48px 0 28px;}
  .footer-grid{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:32px;}
  .footer-brand{display:flex;align-items:center;gap:14px;}
  .footer-cols{display:flex;gap:48px;flex-wrap:wrap;}
  .footer-cols h5{font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#5b6b65;margin-bottom:12px;}
  .footer-cols a{display:block;font-size:0.92rem;margin-bottom:8px;color:#3c4d46;}
  .footer-cols a:hover{color:var(--primary);}
  .footer-bottom{
    margin-top:40px;padding-top:20px;border-top:1px solid var(--line);
    font-size:0.82rem;color:#5b6b65;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;
  }

  /* ===== REVEAL ===== */
  .reveal{opacity:0;transform:translateY(18px);transition:opacity 0.6s ease, transform 0.6s ease;}
  .reveal.visible{opacity:1;transform:translateY(0);}
</style>
</head>
